name: Build & Publish Fat Mod

on:
  push:
    branches:
      - main
      - master
      - develop
      - '*-patched'
      - '*-patched-dev'
    tags: ['*']
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      entcore_version:
        description: 'Version entcore (ex: 6.14.9-patched). Laissez vide pour utiliser la version du pom.xml.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  frontend:
    name: Build Frontend (pnpm workspace/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (workspace root)
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend workspace
        run: pnpm --filter "@edifice.io/rack-frontend" build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  backend:
    name: Build & Publish Fat Mod
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: temurin
          cache: maven

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Inject frontend into backend resources
        run: |
          mkdir -p backend/src/main/resources/public/img backend/src/main/resources/view
          cp -r frontend/dist/. backend/src/main/resources/
          find backend/src/main/resources -maxdepth 1 -name "*.html" \
            -exec mv {} backend/src/main/resources/view/ \;
          if [ -d backend/src/main/resources/img ]; then
            mv backend/src/main/resources/img/* backend/src/main/resources/public/img/ 2>/dev/null || true
            rmdir backend/src/main/resources/img 2>/dev/null || true
          fi

      - name: Configure Maven pour GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$GITHUB_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub open-ent Packages</name>
                    <url>https://maven.pkg.github.com/open-ent/entcore-v2</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Build fat JAR
        working-directory: backend
        run: |
          ENTCORE_OPT=""
          if [ -n "$ENTCORE_VERSION" ]; then ENTCORE_OPT="-DentCoreVersion=$ENTCORE_VERSION"; fi
          mvn clean package -DskipTests -B $ENTCORE_OPT
        env:
          ENTCORE_VERSION: ${{ github.event.inputs.entcore_version }}

      - name: Run tests
        if: github.event_name == 'pull_request'
        working-directory: backend
        run: mvn test -B

      - name: Configure Maven for GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish fat JAR to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          FAT_JAR=$(ls target/*-fat.jar 2>/dev/null | head -1)
          echo "Publishing ${GROUP_ID}:${ARTIFACT_ID}:${VERSION}:fat"
          if [ -z "${FAT_JAR}" ]; then
            echo "::error::Fat JAR not found at ${FAT_JAR}"
            ls -la target/*.jar 2>/dev/null || echo "No JARs found in target/"
            exit 1
          fi
          mvn deploy:deploy-file \
            -Dfile="${FAT_JAR}" \
            -DgroupId="${GROUP_ID}" \
            -DartifactId="${ARTIFACT_ID}" \
            -Dversion="${VERSION}" \
            -Dclassifier=fat \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl="https://maven.pkg.github.com/${{ github.repository }}" \
            -B

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/target/*-fat.jar
          generate_release_notes: true
